.modal-body{padding:16px 18px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:.82rem;font-weight:500;margin-bottom:3px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:8px 10px;border:1px solid var(--b);border-radius:var(--rs);font-size:.88rem;font-family:inherit;background:var(--bgc);-webkit-appearance:none;transition:border-color .15s}

</style>

function load() {
  try { materials = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { materials = []; }
  if (materials.length === 0) { materials = JSON.parse(JSON.stringify(SEED_DATA)); localStorage.setItem(STORAGE_KEY, JSON.stringify(materials)); }
  materials.forEach(function(m) { if (!m.status) m.status = 'approved'; });
  try { pending = JSON.parse(localStorage.getItem(PENDING_KEY) || '[]'); } catch(e) { pending = []; }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(materials));
  localStorage.setItem(PENDING_KEY, JSON.stringify(pending));
  scheduleCloudSync();
}

function setSyncStatus(status, text) {
  var d = document.getElementById('syncDot');
  d.className = 'sync-dot ' + status;
  document.getElementById('syncStatus').innerHTML = d.outerHTML + ' ' + text;
}

function scheduleCloudSync() {
  if (syncTimer) clearTimeout(syncTimer);
  syncTimer = setTimeout(cloudSync, 2000);
}

  try {
    setSyncStatus('online', '鍚屾涓?);

async function cloudLoad() {
  try {
    var resp = await fetch(API + '?all=1');
    if (!resp.ok) return;
    var cloud = await resp.json();
    if (!Array.isArray(cloud) || cloud.length === 0) return;
    var all = {};
    materials.forEach(function(m) { all[m.id] = m; });
    pending.forEach(function(m) { all[m.id] = m; });
    cloud.forEach(function(m) {
      if (!all[m.id] || (m.updated_at||'') > (all[m.id].updated_at||'')) {
        all[m.id] = m;
      }
    });
    materials = []; pending = [];
    Object.values(all).forEach(function(m) {
      if (m.status === 'pending') { pending.push(m); }
      else { materials.push(m); }
    });
    save(); render(); loadPendingCount();
    setSyncStatus('online', '宸插悓姝?);
  } catch(e) {}
}

async function loadPendingCount() {
  try {
    var resp = await fetch(API + '/pending');
    if (!resp.ok) return;
    var cloud = await resp.json();
    if (Array.isArray(cloud)) {
      pending = cloud;
      localStorage.setItem(PENDING_KEY, JSON.stringify(pending));
    }
    updatePendingBadge();
  } catch(e) {}
}

  if (n > 0) {
    el.style.display = 'inline'; el.textContent = n;
    dot.style.display = 'inline-block';
  } else {
    el.style.display = 'none';
    dot.style.display = 'none';
  }

function ts() { return new Date().toISOString().replace('T',' ').slice(0,19); }

function render() {
  var s = document.getElementById('search').value.trim().toLowerCase();
  document.getElementById('clearSearch').style.display = s ? 'block' : 'none';

  if (showPending) {
    renderPending(s);
  } else {
    renderApproved(s);
  }
  renderCategories();
}

  });
  items.sort(function(a,b) { return b.updated_at.localeCompare(a.updated_at); });

  save(); render(); closeModal('detail-modal');
  try { await fetch(API + '/' + id, {method:'DELETE'}); } catch(e) {}
  toast('宸叉嫆缁?);
}

function openEditPending(id) {
  var m = pending.find(function(x){return x.id===id;});
  if (!m) return;
  editId = id;
  document.getElementById('editTitle').textContent = '缂栬緫骞跺鏍?;
  document.getElementById('etitle').value = m.title || '';
  document.getElementById('econtent').value = m.content || '';
  document.getElementById('ecat').value = m.category || '鍚嶈█璀﹀彞';
  document.getElementById('etags').value = m.tags ? m.tags.join(', ') : '';
  document.getElementById('esource').value = m.source || '';
  document.getElementById('enotes').value = m.notes || '';
  document.getElementById('eid').value = 'pending_' + id;
  closeModal('detail-modal');
  openModal('edit-modal');
}

function esc(s) { var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

function openEdit(id) {
  showPending = false;
  editId = id || null;
  var m = id ? materials.find(function(x){return x.id===id;}) : null;
  document.getElementById('editTitle').textContent = m ? '缂栬緫绱犳潗' : '鏂板绱犳潗';
  document.getElementById('etitle').value = m ? m.title : '';
  document.getElementById('econtent').value = m ? m.content : '';
  document.getElementById('ecat').value = m ? m.category : '鍚嶈█璀﹀彞';
  document.getElementById('etags').value = m && m.tags ? m.tags.join(', ') : '';
  document.getElementById('esource').value = m ? m.source : '';
  document.getElementById('enotes').value = m ? m.notes : '';
  document.getElementById('eid').value = m ? m.id : '';
  openModal('edit-modal');
}

function saveMaterial(e) {
  e.preventDefault();
  var title = document.getElementById('etitle').value.trim();
  var content = document.getElementById('econtent').value.trim();
  if (!title || !content) return toast('鏍囬鍜屽唴瀹逛笉鑳戒负绌?);
  var data = {
    title:title, content:content,
    category:document.getElementById('ecat').value,
    tags:document.getElementById('etags').value.split(/[,锛宂/).map(function(t){return t.trim();}).filter(Boolean),
    source:document.getElementById('esource').value.trim(),
    notes:document.getElementById('enotes').value.trim(),
    status:'approved',
    updated_at:ts()
  };
  var rawId = document.getElementById('eid').value;
  if (rawId && rawId.indexOf('pending_') === 0) {
    // Editing a pending item -> approve it
    var pid = rawId.replace('pending_', '');
    pending = pending.filter(function(x){return x.id!==pid;});
    data.id = pid;
    data.created_at = ts();
    materials.push(data);
    try { fetch(API + '/' + pid + '/approve', {method:'POST'}); } catch(e) {}
  } else if (editId) {
    var idx = materials.findIndex(function(m){return m.id===editId;});
    if (idx >= 0) { data.id = editId; data.created_at = materials[idx].created_at; materials[idx] = data; }
  } else {
    data.id = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    data.created_at = ts();
    materials.push(data);
  }
  save(); render(); closeModal('edit-modal');
  toast(editId ? '宸叉洿鏂? : '宸叉坊鍔?);
  editId = null;
}

function viewDetail(id) {
  var m = materials.find(function(x){return x.id===id;});
  if (!m) return;
  document.getElementById('dtitle').textContent = m.title;
  var h = '<div class="form-group"><label>鍒嗙被</label><div><span class="card-cat">'+esc(m.category)+'</span></div></div>';
  if (m.tags && m.tags.length) h += '<div class="form-group"><label>鏍囩</label><div>'+m.tags.map(function(t){return'<span class="card-tag">'+esc(t)+'</span>';}).join(' ')+'</div></div>';
  h += '<div class="form-group"><label>鍐呭</label><div style="white-space:pre-wrap;line-height:1.8">'+esc(m.content)+'</div></div>';
  if (m.source) h += '<div class="form-group"><label>鍑哄</label><div>'+esc(m.source)+'</div></div>';
  if (m.notes) h += '<div class="form-group"><label>澶囨敞</label><div>'+esc(m.notes)+'</div></div>';
  h += '<div class="form-group"><label>鏇存柊鏃堕棿</label><div class="text-muted">'+m.updated_at+'</div></div>';
  h += '<div style="display:flex;gap:8px;margin-top:16px">'+
    '<button class="btn btn-outline" onclick="copyText(\''+m.id+'\');closeModal(\'detail-modal\')">馃搵 澶嶅埗</button>'+
    '<button class="btn btn-primary" onclick="closeModal(\'detail-modal\');openEdit(\''+m.id+'\')">鉁忥笍 缂栬緫</button>'+
    '<button class="btn btn-danger" onclick="closeModal(\'detail-modal\');deleteMaterial(\''+m.id+'\')">馃棏 鍒犻櫎</button></div>';
  document.getElementById('dbody').innerHTML = h;
  openModal('detail-modal');
}

function deleteMaterial(id) {
  if (!confirm('纭畾鍒犻櫎锛?)) return;
  materials = materials.filter(function(x){return x.id!==id;});
  save(); render();
  fetch(API + '/' + id, {method:'DELETE'}).catch(function(){});
  toast('宸插垹闄?);
}

async function copyText(id) {
  var source = materials.concat(pending);
  var m = source.find(function(x){return x.id===id;});
  if (!m) return;
  try { await navigator.clipboard.writeText(m.content); toast('宸插鍒?); }
  catch(e) {
    var ta = document.createElement('textarea');
    ta.value = m.content; ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('宸插鍒?);
  }
}

function exportData() {
  var blob = new Blob([JSON.stringify(materials.concat(pending),null,2)],{type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'materials-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(a.href);
  toast('瀵煎嚭鎴愬姛');
}

function importData(input) {
  var file = input.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var items = JSON.parse(e.target.result);
      if (!Array.isArray(items)) return toast('鏍煎紡閿欒');
      var added = 0, skipped = 0;
      items.forEach(function(item) {
        if (materials.find(function(m){return m.title===item.title&&m.content===item.content;}) ||
            pending.find(function(m){return m.title===item.title&&m.content===item.content;})) { skipped++; return; }
        var obj = {
          id: item.id||Date.now().toString(36)+Math.random().toString(36).slice(2,6),
          title:item.title||'', content:item.content||'',
          category:item.category||'鍏朵粬', tags:item.tags||[],
          source:item.source||'', notes:item.notes||'',
          status:item.status||'approved',
          created_at:item.created_at||ts(), updated_at:ts()
        };
        if (obj.status === 'pending') pending.push(obj);
        else materials.push(obj);
        added++;
      });
      save(); render(); closeModal('settings-modal');
      toast('鏂板 '+added+' 鏉★紝璺宠繃 '+skipped+' 鏉?);
    } catch(ex) { toast('鏂囦欢鏍煎紡閿欒'); }
    input.value = '';
  };
  reader.readAsText(file);
}

function clearAll() {
  materials = []; pending = []; save(); render();
  fetch(API + '/clear', {method:'POST'}).catch(function(){});
  toast('宸叉竻绌?);
}

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

var toastTimer;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){el.style.display='none';},1800);
}

function switchTab(tab) {
  document.querySelectorAll('.mobile-nav button').forEach(function(b){b.classList.remove('active');});
  var btn = document.querySelector('[data-tab="'+tab+'"]');
  if (btn) btn.classList.add('active');
  var sidebar = document.getElementById('sidebar');
  if (tab === 'review') { showPending = true; currentCat = ''; sidebar.classList.remove('show'); render(); }
  else if (tab === 'cats') { showPending = false; sidebar.classList.add('show'); }
  else { showPending = false; sidebar.classList.remove('show'); render(); }
  if (tab === 'settings') openModal('settings-modal');
  document.getElementById('reviewBtn').classList.toggle('active', showPending);
}

document.querySelectorAll('.modal-overlay').forEach(function(ov) {
  ov.addEventListener('click', function(e) { if (e.target === ov) ov.classList.remove('show'); });
});

document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey||e.metaKey) && e.key==='k') { e.preventDefault(); document.getElementById('search').focus(); }
});

load(); render(); loadPendingCount();
setTimeout(cloudLoad, 1500);
</script>
</body>
