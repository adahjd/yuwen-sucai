<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#4f46e5;--ph:#4338ca;--danger:#ef4444;--dh:#dc2626;--bg:#f8fafc;--bgc:#fff;--bgs:#f1f5f9;--t:#1e293b;--ts:#64748b;--b:#e2e8f0;--r:10px;--rs:6px;--sh:0 1px 3px rgba(0,0,0,.08);--shm:0 4px 12px rgba(0,0,0,.1);--green:#22c55e;--red:#ef4444}
html{font-size:16px;-webkit-tap-highlight-color:transparent}

.logo{font-size:1.1rem;font-weight:700}
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border:none;border-radius:var(--rs);font-size:.88rem;cursor:pointer;transition:all .15s;white-space:nowrap;background:var(--bgc);color:var(--t);min-height:36px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--ph)}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:var(--bgc);border:1px solid var(--b)}
.btn-success{background:var(--green);color:#fff}
.btn-icon{background:none;padding:8px;font-size:1.1rem;color:var(--ts);min-width:36px}
.btn-block{width:100%;justify-content:center}
.btn-sm{padding:4px 8px;font-size:.78rem;min-height:28px}
.search-bar{position:sticky;top:52px;top:calc(52px + env(safe-area-inset-top,0px));z-index:99;padding:6px 14px;background:var(--bg)}

.main-layout{display:grid;grid-template-columns:180px 1fr;min-height:calc(100dvh - 104px)}
.sidebar{background:var(--bgs);border-right:1px solid var(--b);padding:10px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:0 6px 6px;font-size:.82rem;font-weight:600;color:var(--ts)}
.badge{background:var(--primary);color:#fff;font-size:.68rem;padding:2px 8px;border-radius:10px}
.badge-red{background:var(--red)}
.badge-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red);margin-left:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.category-nav{display:flex;flex-direction:column;gap:1px}
.cat-item{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:var(--rs);text-decoration:none;color:var(--t);font-size:.88rem;cursor:pointer;transition:background .15s;border:none;background:none;width:100%;text-align:left;-webkit-tap-highlight-color:transparent;min-height:36px}

.cat-item.review-item{color:var(--primary);font-weight:600}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 16px;color:var(--ts);text-align:center}
.empty-icon{font-size:3rem;margin-bottom:10px}
.card{background:var(--bgc);border-radius:var(--r);padding:12px 14px;box-shadow:var(--sh);cursor:pointer;position:relative;transition:box-shadow .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;border:1px solid transparent}

.card:hover{box-shadow:var(--shm)}

.card-title{font-weight:600;font-size:.92rem;flex:1;word-break:break-all}
.card-actions{display:flex;gap:2px;flex-shrink:0}
.card-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.card-cat{font-size:.72rem;padding:2px 8px;border-radius:20px;background:#ede9fe;color:var(--primary)}
.card-tag{font-size:.7rem;padding:1px 7px;border-radius:20px;background:#f1f5f9;color:var(--ts)}
.card-preview{margin-top:6px;font-size:.85rem;color:var(--ts);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-source{margin-top:4px;font-size:.78rem;color:var(--ts)}
.card-review-badge{position:absolute;top:8px;right:8px;font-size:.68rem;padding:2px 8px;border-radius:20px;background:#fef3c7;color:#d97706;font-weight:600}
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:var(--bgc);border-radius:var(--r);box-shadow:var(--shm);width:100%;max-width:500px;max-height:90dvh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--b);position:sticky;top:0;background:var(--bgc);z-index:5}
.modal-header h3{font-size:1rem}
.modal-body{padding:16px 18px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:.82rem;font-weight:500;margin-bottom:3px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:8px 10px;border:1px solid var(--b);border-radius:var(--rs);font-size:.88rem;font-family:inherit;background:var(--bgc);-webkit-appearance:none;transition:border-color .15s}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.required{color:var(--danger)}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 22px;border-radius:20px;font-size:.88rem;z-index:300;display:none;animation:toastIn .25s ease;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;height:56px;padding-bottom:env(safe-area-inset-bottom,0px);background:var(--bgc);border-top:1px solid var(--b);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}

.mobile-nav button.active{color:var(--primary);font-weight:600}
.mobile-nav .badge-dot{vertical-align:middle}
.text-muted{color:var(--ts);font-size:.82rem}
.mt-2{margin-top:6px}
@media(max-width:768px){
  .main-layout{grid-template-columns:1fr;min-height:0}
  .sidebar{display:none}
  .sidebar.show{display:block;position:fixed;inset:0;top:52px;top:calc(52px + env(safe-area-inset-top,0px));z-index:150;padding-top:6px;padding-bottom:calc(60px + env(safe-area-inset-bottom,0px))}
  .mobile-nav{display:flex}
  .form-row{grid-template-columns:1fr}
  .topbar{padding:0 12px;height:48px}
  .logo{font-size:1rem}
  .btn{padding:8px 14px;font-size:.84rem;min-height:38px}
  .btn-primary{padding:8px 14px;font-size:.82rem}

  .card-preview{font-size:.9rem;-webkit-line-clamp:3}
  .card-cat{font-size:.75rem;padding:3px 10px}
  .card-tag{font-size:.72rem;padding:2px 8px}
  .material-list{padding:8px;gap:10px}
  .modal{border-radius:16px 16px 0 0;max-height:85dvh;position:fixed;bottom:0;left:0;right:0;max-width:100%;margin:0}
  .modal-overlay{align-items:flex-end;padding:0}
  .modal-header{border-radius:16px 16px 0 0}
  .form-group input,.form-group textarea,.form-group select{font-size:1rem;padding:10px 12px}
  .form-group label{font-size:.88rem}
  .toast{bottom:70px;font-size:.85rem;padding:10px 20px}

  body{padding-bottom:calc(56px + env(safe-area-inset-bottom,0px))}

</style>
</head>

function load() {
  try { materials = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { materials = []; }
  if (materials.length === 0) { materials = JSON.parse(JSON.stringify(SEED_DATA)); localStorage.setItem(STORAGE_KEY, JSON.stringify(materials)); }
  materials.forEach(function(m) { if (!m.status) m.status = 'approved'; });
  try { pending = JSON.parse(localStorage.getItem(PENDING_KEY) || '[]'); } catch(e) { pending = []; }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(materials));
  localStorage.setItem(PENDING_KEY, JSON.stringify(pending));
  scheduleCloudSync();
}

function setSyncStatus(status, text) {
  var d = document.getElementById('syncDot');
  d.className = 'sync-dot ' + status;
  document.getElementById('syncStatus').innerHTML = d.outerHTML + ' ' + text;
}

function scheduleCloudSync() {
  if (syncTimer) clearTimeout(syncTimer);
  syncTimer = setTimeout(cloudSync, 2000);
}

async function cloudSync() {
  try {
    setSyncStatus('online', 'еҗҢжӯҘдё?);
    var all = materials.concat(pending);
    var resp = await fetch(API + '/sync', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(all)
    });
    if (resp.ok) { setSyncStatus('online', 'е·ІеҗҢжӯ?); }
    else { setSyncStatus('offline', 'еӨұиҙҘ'); }
  } catch(e) { setSyncStatus('offline', 'зҰ»зәҝ'); }
}

async function triggerCrawl() {
  var btn = document.getElementById("crawlBtn");
  var st = document.getElementById("crawlStatus");
  btn.disabled = true; btn.textContent = "? ЕАИЎЦР..."; st.style.display = "block"; st.textContent = "ХэФЪҙУBХҫЧҘИЎЛШІД...";
  try {
    var res = await fetch(API.replace("/materials","") + "/crawl", { method: "POST" });
    var data = await res.json();
    if(data.added > 0) {
      st.textContent = "? іЙ№ҰЧҘИЎ " + data.added + " ЖӘЛШІДЈЎЗлөҪЎёҙэЙуәЛЎ№Ійҝҙ";
      loadPendingCount();
    } else {
      st.textContent = "? ОҙХТөҪРВөДёЯЦКБҝЛШІДЈ¬ҝЙЙФәуЦШКФ";
    }
  } catch(e) {
    st.textContent = "? ЕАИЎК§°Ь: " + e.message;
  }
  btn.disabled = false; btn.textContent = "?? БўјҙЕАИЎЛШІД";
}
async function forceCloudSync() { await cloudSync(); toast('еҗҢжӯҘе®ҢжҲҗ'); }

async function cloudLoad() {
  try {
    var resp = await fetch(API + '?all=1');
    if (!resp.ok) return;
    var cloud = await resp.json();
    if (!Array.isArray(cloud) || cloud.length === 0) return;
    var all = {};
    materials.forEach(function(m) { all[m.id] = m; });
    pending.forEach(function(m) { all[m.id] = m; });
    cloud.forEach(function(m) {
      if (!all[m.id] || (m.updated_at||'') > (all[m.id].updated_at||'')) {
        all[m.id] = m;
      }
    });
    materials = []; pending = [];
    Object.values(all).forEach(function(m) {
      if (m.status === 'pending') { pending.push(m); }
      else { materials.push(m); }
    });
    save(); render(); loadPendingCount();
    setSyncStatus('online', 'е·ІеҗҢжӯ?);
  } catch(e) {}
}

async function loadPendingCount() {
  try {
    var resp = await fetch(API + '/pending');
    if (!resp.ok) return;
    var cloud = await resp.json();
    if (Array.isArray(cloud)) {
      pending = cloud;
      localStorage.setItem(PENDING_KEY, JSON.stringify(pending));
    }
    updatePendingBadge();
  } catch(e) {}
}

function updatePendingBadge() {
  var n = pending.length;
  var el = document.getElementById('pendingCount');
  var dot = document.getElementById('reviewDotMobile');
  if (n > 0) {
    el.style.display = 'inline'; el.textContent = n;
    dot.style.display = 'inline-block';
  } else {
    el.style.display = 'none';
    dot.style.display = 'none';
  }
}

function showReview() {
  showPending = true;
  currentCat = '';
  document.querySelectorAll('.cat-item').forEach(function(b){b.classList.remove('active');});
  document.getElementById('reviewBtn').classList.add('active');
  if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('show');
  render();
}

function ts() { return new Date().toISOString().replace('T',' ').slice(0,19); }

function render() {
  var s = document.getElementById('search').value.trim().toLowerCase();
  document.getElementById('clearSearch').style.display = s ? 'block' : 'none';

  if (showPending) {
    renderPending(s);
  } else {
    renderApproved(s);
  }
  renderCategories();
}

function renderPending(s) {
  var items = pending;
  if (s) items = items.filter(function(m) {
    return (m.title||'').toLowerCase().indexOf(s) >= 0 || (m.content||'').toLowerCase().indexOf(s) >= 0;
  });
  items.sort(function(a,b) { return b.updated_at.localeCompare(a.updated_at); });

  var list = document.getElementById('list');
  if (items.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">рҹҺү</div><p>жІЎжңүеҫ…е®Ўж ёзҙ жқ?/p></div>';
  } else {
    list.innerHTML = '<div style="padding:4px 0 8px;font-size:.85rem;color:var(--ts)">еҫ…е®Ўж ?' + items.length + ' жқ?вҖ?жҜҸеӨ©8зӮ№иҮӘеҠЁзҲ¬еҸ?/div>' +
      items.map(function(m) {
        return '<div class="card pending-card" onclick="viewPending(\''+m.id+'\')">'+
          '<div class="card-review-badge">еҫ…е®Ўж ?/div>'+
          '<div class="card-header"><span class="card-title">'+esc(m.title)+'</span></div>'+
          '<div class="card-meta"><span class="card-cat">'+esc(m.category)+'</span>'+
          (m.tags||[]).map(function(t){return'<span class="card-tag">'+esc(t)+'</span>';}).join('')+'</div>'+
          '<div class="card-preview">'+esc(m.content)+'</div>'+
          (m.source?'<div class="card-source">рҹ“– '+esc(m.source)+'</div>':'')+'</div>';
      }).join('');
  }
}

function renderApproved(s) {
  var items = materials;
  if (currentCat) items = items.filter(function(m) { return m.category === currentCat; });
  if (s) items = items.filter(function(m) {
    return (m.title||'').toLowerCase().indexOf(s) >= 0 ||
      (m.content||'').toLowerCase().indexOf(s) >= 0 ||
      (m.source||'').toLowerCase().indexOf(s) >= 0 ||
      (m.notes||'').toLowerCase().indexOf(s) >= 0;
  });
  items.sort(function(a,b) { return b.updated_at.localeCompare(a.updated_at); });

  var list = document.getElementById('list');
  if (items.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">рҹ“ӯ</div><p>жІЎжңүеҢ№й…Қзҡ„зҙ жқ?/p></div>';
  } else {
    list.innerHTML = items.map(function(m) {
      return '<div class="card" onclick="viewDetail(\''+m.id+'\')">'+
        '<div class="card-header"><span class="card-title">'+esc(m.title)+'</span>'+
        '<div class="card-actions" onclick="event.stopPropagation()"><button class="btn btn-icon btn-sm" onclick="copyText(\''+m.id+'\')">рҹ“Ӣ</button></div></div>'+
        '<div class="card-meta"><span class="card-cat">'+esc(m.category)+'</span>'+
        (m.tags||[]).map(function(t){return'<span class="card-tag">'+esc(t)+'</span>';}).join('')+'</div>'+
        '<div class="card-preview">'+esc(m.content)+'</div>'+
        (m.source?'<div class="card-source">рҹ“– '+esc(m.source)+'</div>':'')+'</div>';
    }).join('');
  }
}

function renderCategories() {
  if (showPending) return;
  var cats = [];
  materials.forEach(function(m) { if (cats.indexOf(m.category) < 0) cats.push(m.category); });
  document.getElementById('catCount').textContent = cats.length;
  var preset = ['еҗҚиЁҖиӯҰеҸҘ','еҘҪиҜҚеҘҪеҸҘ','иҜ—иҜҚеҗҚеҸҘ','дәәзү©дәӢдҫӢ','ж—¶дәӢзғӯзӮ№','е“ІзҗҶж•…дәӢ','дјҳзҫҺж®өиҗҪ','е…¶д»–'];
  var ordered = preset.filter(function(c) { return cats.indexOf(c) >= 0; });
  var others = cats.filter(function(c) { return preset.indexOf(c) < 0; });
  var allCats = ordered.concat(others);
  var h = '<button class="cat-item '+(currentCat===''&&!showPending?'active':'')+'" onclick="filterCat(\'\')">рҹ“Ӣ е…ЁйғЁ <span class="count">'+materials.length+'</span></button>';
  allCats.forEach(function(c) {
    h += '<button class="cat-item '+(currentCat===c?'active':'')+'" onclick="filterCat(\''+esc(c)+'\')">рҹ“Ң '+esc(c)+' <span class="count">'+materials.filter(function(m){return m.category===c;}).length+'</span></button>';
  });
  document.getElementById('catNav').innerHTML = h;
  document.getElementById('reviewBtn').classList.toggle('active', showPending);
  updatePendingBadge();
}

function filterCat(cat) {
  showPending = false;
  currentCat = cat;
  render();
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('show');
    document.querySelectorAll('.mobile-nav button').forEach(function(b){b.classList.remove('active');});
    document.querySelector('[data-tab="list"]').classList.add('active');
  }
}

function viewPending(id) {
  var m = pending.find(function(x){return x.id===id;});
  if (!m) return;
  document.getElementById('dtitle').textContent = m.title;
  var h = '<div class="form-group"><label>жқҘжәҗ</label><div>'+esc(m.source||'жңӘзҹҘ')+'</div></div>';
  h += '<div class="form-group"><label>AIеҲҶзұ»</label><div><span class="card-cat">'+esc(m.category)+'</span> '+(m.tags||[]).map(function(t){return'<span class="card-tag">'+esc(t)+'</span>';}).join(' ')+'</div></div>';
  h += '<div class="form-group"><label>еҶ…е®№</label><div style="white-space:pre-wrap;line-height:1.8">'+esc(m.content)+'</div></div>';
  if (m.notes) h += '<div class="form-group"><label>еӨҮжіЁ</label><div>'+esc(m.notes)+'</div></div>';
  h += '<div style="display:flex;gap:8px;margin-top:16px">'+
    '<button class="btn btn-success" onclick="approveItem(\''+m.id+'\')">вң?йҖҡиҝҮ</button>'+
    '<button class="btn btn-outline" onclick="closeModal(\'detail-modal\');openEditPending(\''+m.id+'\')">вңҸпёҸ зј–иҫ‘еҗҺйҖҡиҝҮ</button>'+
    '<button class="btn btn-danger" onclick="rejectItem(\''+m.id+'\')">вқ?жӢ’з»қ</button></div>';
  document.getElementById('dbody').innerHTML = h;
  openModal('detail-modal');
}

async function approveItem(id) {
  var m = pending.find(function(x){return x.id===id;});
  if (!m) return;
  m.status = 'approved';
  m.updated_at = ts();
  materials.push(m);
  pending = pending.filter(function(x){return x.id!==id;});
  save(); render(); closeModal('detail-modal');
  try { await fetch(API + '/' + id + '/approve', {method:'POST'}); } catch(e) {}
  toast('е·ІйҖҡиҝҮ');
}

async function rejectItem(id) {
  if (!confirm('зЎ®е®ҡжӢ’з»қе№¶еҲ йҷӨпјҹ')) return;
  pending = pending.filter(function(x){return x.id!==id;});
  save(); render(); closeModal('detail-modal');
  try { await fetch(API + '/' + id, {method:'DELETE'}); } catch(e) {}
  toast('е·ІжӢ’з»?);
}

function openEditPending(id) {
  var m = pending.find(function(x){return x.id===id;});
  if (!m) return;
  editId = id;
  document.getElementById('editTitle').textContent = 'зј–иҫ‘е№¶е®Ўж ?;
  document.getElementById('etitle').value = m.title || '';
  document.getElementById('econtent').value = m.content || '';
  document.getElementById('ecat').value = m.category || 'еҗҚиЁҖиӯҰеҸҘ';
  document.getElementById('etags').value = m.tags ? m.tags.join(', ') : '';
  document.getElementById('esource').value = m.source || '';
  document.getElementById('enotes').value = m.notes || '';
  document.getElementById('eid').value = 'pending_' + id;
  closeModal('detail-modal');
  openModal('edit-modal');
}

function esc(s) { var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

function openEdit(id) {
  showPending = false;
  editId = id || null;
  var m = id ? materials.find(function(x){return x.id===id;}) : null;
  document.getElementById('editTitle').textContent = m ? 'зј–иҫ‘зҙ жқҗ' : 'ж–°еўһзҙ жқҗ';
  document.getElementById('etitle').value = m ? m.title : '';
  document.getElementById('econtent').value = m ? m.content : '';
  document.getElementById('ecat').value = m ? m.category : 'еҗҚиЁҖиӯҰеҸҘ';
  document.getElementById('etags').value = m && m.tags ? m.tags.join(', ') : '';
  document.getElementById('esource').value = m ? m.source : '';
  document.getElementById('enotes').value = m ? m.notes : '';
  document.getElementById('eid').value = m ? m.id : '';
  openModal('edit-modal');
}

function saveMaterial(e) {
  e.preventDefault();
  var title = document.getElementById('etitle').value.trim();
  var content = document.getElementById('econtent').value.trim();
  if (!title || !content) return toast('ж Үйўҳе’ҢеҶ…е®№дёҚиғҪдёәз©?);
  var data = {
    title:title, content:content,
    category:document.getElementById('ecat').value,
    tags:document.getElementById('etags').value.split(/[,пјҢ]/).map(function(t){return t.trim();}).filter(Boolean),
    source:document.getElementById('esource').value.trim(),
    notes:document.getElementById('enotes').value.trim(),
    status:'approved',
    updated_at:ts()
  };
  var rawId = document.getElementById('eid').value;
  if (rawId && rawId.indexOf('pending_') === 0) {
    // Editing a pending item -> approve it
    var pid = rawId.replace('pending_', '');
    pending = pending.filter(function(x){return x.id!==pid;});
    data.id = pid;
    data.created_at = ts();
    materials.push(data);
    try { fetch(API + '/' + pid + '/approve', {method:'POST'}); } catch(e) {}
  } else if (editId) {
    var idx = materials.findIndex(function(m){return m.id===editId;});
    if (idx >= 0) { data.id = editId; data.created_at = materials[idx].created_at; materials[idx] = data; }
  } else {
    data.id = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    data.created_at = ts();
    materials.push(data);
  }
  save(); render(); closeModal('edit-modal');
  toast(editId ? 'е·Іжӣҙж–? : 'е·Іж·»еҠ?);
  editId = null;
}

function viewDetail(id) {
  var m = materials.find(function(x){return x.id===id;});
  if (!m) return;
  document.getElementById('dtitle').textContent = m.title;
  var h = '<div class="form-group"><label>еҲҶзұ»</label><div><span class="card-cat">'+esc(m.category)+'</span></div></div>';
  if (m.tags && m.tags.length) h += '<div class="form-group"><label>ж Үзӯҫ</label><div>'+m.tags.map(function(t){return'<span class="card-tag">'+esc(t)+'</span>';}).join(' ')+'</div></div>';
  h += '<div class="form-group"><label>еҶ…е®№</label><div style="white-space:pre-wrap;line-height:1.8">'+esc(m.content)+'</div></div>';
  if (m.source) h += '<div class="form-group"><label>еҮәеӨ„</label><div>'+esc(m.source)+'</div></div>';
  if (m.notes) h += '<div class="form-group"><label>еӨҮжіЁ</label><div>'+esc(m.notes)+'</div></div>';
  h += '<div class="form-group"><label>жӣҙж–°ж—¶й—ҙ</label><div class="text-muted">'+m.updated_at+'</div></div>';
  h += '<div style="display:flex;gap:8px;margin-top:16px">'+
    '<button class="btn btn-outline" onclick="copyText(\''+m.id+'\');closeModal(\'detail-modal\')">рҹ“Ӣ еӨҚеҲ¶</button>'+
    '<button class="btn btn-primary" onclick="closeModal(\'detail-modal\');openEdit(\''+m.id+'\')">вңҸпёҸ зј–иҫ‘</button>'+
    '<button class="btn btn-danger" onclick="closeModal(\'detail-modal\');deleteMaterial(\''+m.id+'\')">рҹ—‘ еҲ йҷӨ</button></div>';
  document.getElementById('dbody').innerHTML = h;
  openModal('detail-modal');
}

function deleteMaterial(id) {
  if (!confirm('зЎ®е®ҡеҲ йҷӨпј?)) return;
  materials = materials.filter(function(x){return x.id!==id;});
  save(); render();
  fetch(API + '/' + id, {method:'DELETE'}).catch(function(){});
  toast('е·ІеҲ йҷ?);
}

async function copyText(id) {
  var source = materials.concat(pending);
  var m = source.find(function(x){return x.id===id;});
  if (!m) return;
  try { await navigator.clipboard.writeText(m.content); toast('е·ІеӨҚеҲ?); }
  catch(e) {
    var ta = document.createElement('textarea');
    ta.value = m.content; ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('е·ІеӨҚеҲ?);
  }
}

function exportData() {
  var blob = new Blob([JSON.stringify(materials.concat(pending),null,2)],{type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'materials-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(a.href);
  toast('еҜјеҮәжҲҗеҠҹ');
}

function importData(input) {
  var file = input.files[0]; if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var items = JSON.parse(e.target.result);
      if (!Array.isArray(items)) return toast('ж јејҸй”ҷиҜҜ');
      var added = 0, skipped = 0;
      items.forEach(function(item) {
        if (materials.find(function(m){return m.title===item.title&&m.content===item.content;}) ||
            pending.find(function(m){return m.title===item.title&&m.content===item.content;})) { skipped++; return; }
        var obj = {
          id: item.id||Date.now().toString(36)+Math.random().toString(36).slice(2,6),
          title:item.title||'', content:item.content||'',
          category:item.category||'е…¶д»–', tags:item.tags||[],
          source:item.source||'', notes:item.notes||'',
          status:item.status||'approved',
          created_at:item.created_at||ts(), updated_at:ts()
        };
        if (obj.status === 'pending') pending.push(obj);
        else materials.push(obj);
        added++;
      });
      save(); render(); closeModal('settings-modal');
      toast('ж–°еўһ '+added+' жқЎпјҢи·іиҝҮ '+skipped+' жқ?);
    } catch(ex) { toast('ж–Үд»¶ж јејҸй”ҷиҜҜ'); }
    input.value = '';
  };
  reader.readAsText(file);
}

function clearAll() {
  materials = []; pending = []; save(); render();
  fetch(API + '/clear', {method:'POST'}).catch(function(){});
  toast('е·Іжё…з©?);
}

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

var toastTimer;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){el.style.display='none';},1800);
}

function switchTab(tab) {
  document.querySelectorAll('.mobile-nav button').forEach(function(b){b.classList.remove('active');});
  var btn = document.querySelector('[data-tab="'+tab+'"]');
  if (btn) btn.classList.add('active');
  var sidebar = document.getElementById('sidebar');
  if (tab === 'review') { showPending = true; currentCat = ''; sidebar.classList.remove('show'); render(); }
  else if (tab === 'cats') { showPending = false; sidebar.classList.add('show'); }
  else { showPending = false; sidebar.classList.remove('show'); render(); }
  if (tab === 'settings') openModal('settings-modal');
  document.getElementById('reviewBtn').classList.toggle('active', showPending);
}

document.querySelectorAll('.modal-overlay').forEach(function(ov) {
  ov.addEventListener('click', function(e) { if (e.target === ov) ov.classList.remove('show'); });
});

document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey||e.metaKey) && e.key==='k') { e.preventDefault(); document.getElementById('search').focus(); }
});

load(); render(); loadPendingCount();
setTimeout(cloudLoad, 1500);
</script>
